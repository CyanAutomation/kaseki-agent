name: Publish NPM

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Comma-separated tags to publish. Leave empty to auto-detect from latest git tag. Use this to retry publishing if Release succeeded but npm publish failed, or to test-publish a specific version."
        required: false
        default: ""
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Get all tags

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify npm authentication setup
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "npm config registry: $(npm config get registry)"
          echo ".npmrc location: $(npm config get userconfig)"
          echo "Checking for authentication configuration..."
          # Check if OIDC token is available
          if [[ -n "$NODE_AUTH_TOKEN" ]]; then
            echo "✅ NODE_AUTH_TOKEN is set (OIDC token available)"
          else
            echo "⚠️  NODE_AUTH_TOKEN not set - checking for token in .npmrc"
            grep -q "^//" "$HOME/.npmrc" 2>/dev/null && echo "✅ .npmrc has authentication" || echo "❌ No authentication found in .npmrc"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.tags }}" ]]; then
            # Manual trigger with explicit tags input
            VERSION=$(echo "${{ github.event.inputs.tags }}" | cut -d',' -f1)
            echo "ℹ️  Using provided version: ${VERSION}"
            npm version ${VERSION} --no-git-tag-version || true
          else
            # Automatic trigger from Release workflow or manual trigger without tags
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            echo "ℹ️  Auto-detected version from git tags: ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Build
        run: npm run build

      - name: Publish to npm registry (OIDC trusted publisher)
        run: |
          set +e  # Don't exit on error, we want to provide diagnostics
          npm publish --access public
          PUBLISH_EXIT_CODE=$?
          
          if [[ $PUBLISH_EXIT_CODE -eq 0 ]]; then
            echo "✅ npm publish succeeded"
            exit 0
          else
            echo "❌ npm publish failed with exit code: $PUBLISH_EXIT_CODE"
            echo ""
            echo "📋 OIDC Trusted Publishing Setup Required"
            echo "=========================================="
            echo ""
            echo "If you see '404 Not Found', your npm account needs OIDC configuration:"
            echo ""
            echo "1. Go to https://npmjs.com/settings/YOUR_ORG_OR_USERNAME/access"
            echo "2. Enable 'GitHub Actions' OIDC integration"
            echo "3. Configure your organization/package permissions"
            echo ""
            echo "For @cyanautomation/kaseki-agent, ensure:"
            echo "  - org: cyanautomation has OIDC enabled"
            echo "  - GitHub repository has 'id-token: write' permission (✅ already configured)"
            echo ""
            echo "See: https://docs.npmjs.com/cli/using-npm/configure-npm/configuring-your-npm-client-with-github-actions"
            echo ""
            exit $PUBLISH_EXIT_CODE
          fi

      - name: Verify on npm registry
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Waiting for npm registry to index package..."
          sleep 5
          npm view @cyanautomation/kaseki-agent@${VERSION} > /tmp/npm-view.json
          if grep -q "\"version\": \"${VERSION}\"" /tmp/npm-view.json; then
            echo "✅ Package successfully published: @cyanautomation/kaseki-agent@${VERSION}"
            cat /tmp/npm-view.json | jq '.version, .dist.tarball'
          else
            echo "❌ Failed to verify package on npm registry"
            exit 1
          fi

      - name: Upload publish metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-publish-metadata
          path: /tmp/npm-view.json
          retention-days: 30
