name: Publish NPM

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Comma-separated tags to publish. Leave empty to auto-detect from latest git tag."
        required: false
        default: ""
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Remove deprecated npm auth config
        run: npm config delete always-auth || true

      - name: Install dependencies
        run: npm ci

      - name: Build distribution
        run: npm run build

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # Version ownership: semantic-release updates package.json,
          # package-lock.json, and CHANGELOG.md in the release commit.
          # This publish workflow only verifies and publishes that exact version.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tags }}" ]]; then
            VERSION=$(echo "${{ github.event.inputs.tags }}" | cut -d',' -f1 | sed 's/^v//')
            echo "ℹ️ Using provided version: ${VERSION}"
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            echo "ℹ️ Auto-detected version from latest git tag: ${VERSION}"
          fi

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          LOCKFILE_VERSION=$(node -p "require('./package-lock.json').version")
          LOCKFILE_ROOT_VERSION=$(node -p "require('./package-lock.json').packages[''].version")

          echo "ℹ️ Resolved release version: ${VERSION}"
          echo "ℹ️ package.json version: ${PACKAGE_VERSION}"
          echo "ℹ️ package-lock.json version: ${LOCKFILE_VERSION}"
          echo "ℹ️ package-lock.json root package version: ${LOCKFILE_ROOT_VERSION}"

          if [[ "${PACKAGE_VERSION}" != "${VERSION}" || "${LOCKFILE_VERSION}" != "${VERSION}" || "${LOCKFILE_ROOT_VERSION}" != "${VERSION}" ]]; then
            echo "❌ Release artifacts are not synchronized with ${VERSION}."
            echo "❌ semantic-release must update package.json, package-lock.json, and CHANGELOG.md before publishing."
            exit 1
          fi

          # CHANGELOG check with retry logic to handle workflow_run race condition:
          # When triggered by workflow_run (after Release completes), git refs may not
          # have fully propagated from the release push. Retry with backoff to ensure
          # the latest remote changes are available.
          # Note: Match both "# [VERSION]" and "## [VERSION]" formats to handle inconsistent
          # changelog heading levels (single vs double hash depending on release version).
          changelog_found=false
          for attempt in {1..3}; do
            # Ensure we have the latest remote refs (especially important for workflow_run trigger)
            git fetch origin main --quiet
            
            if grep -qE "^#{1,2} \[${VERSION}\]" CHANGELOG.md; then
              changelog_found=true
              break
            fi
            
            if [[ $attempt -lt 3 ]]; then
              echo "⏳ Changelog entry not found (attempt $attempt/3), retrying in 5 seconds..."
              sleep 5
            fi
          done

          if [[ "${changelog_found}" != "true" ]]; then
            echo "❌ CHANGELOG.md is missing a release entry for ${VERSION}."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Show resolved package info
        run: |
          echo "Package name:"
          node -p "require('./package.json').name"

          echo "Package version:"
          node -p "require('./package.json').version"

          echo "Repository:"
          node -p "require('./package.json').repository.url"

      - name: Check current npm package state
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"

          echo "Checking npm package: ${PACKAGE_NAME}"
          npm view "${PACKAGE_NAME}" name version versions --json

          echo "Checking whether target version already exists: ${PACKAGE_NAME}@${VERSION}"

          if npm view "${PACKAGE_NAME}@${VERSION}" version --json >/tmp/existing-version.json 2>/dev/null; then
            echo "⚠️ ${PACKAGE_NAME}@${VERSION} already exists on npm."
            cat /tmp/existing-version.json
            exit 1
          else
            echo "✅ ${PACKAGE_NAME}@${VERSION} does not exist yet; safe to publish."
          fi

      - name: Publish smoke test
        run: npm run test:publish-smoke

      - name: Log package contents and exact publish version
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"

          echo "📦 Packing ${PACKAGE_NAME}@${VERSION}"
          npm pack --dry-run --json > /tmp/npm-pack-dry-run.json
          jq '.[0] | {name, version, filename, files: (.files | length), unpackedSize}' /tmp/npm-pack-dry-run.json

      - name: Publish to npm registry
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          echo "🚀 Publishing ${PACKAGE_NAME}@${VERSION}"
          npm publish --access public --provenance --loglevel verbose

      - name: Verify on npm registry
        shell: bash
        env:
          KASEKI_VERIFY_DEBUG: "0"
        run: |
          set -euo pipefail

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"

          # Use exponential backoff polling to verify package on npm registry
          # Retries with delays: 1s, 2s, 4s, 8s, 16s, 32s (6 attempts, ~63 seconds total)
          ./scripts/npm-verify-publish.sh "${PACKAGE_NAME}" "${VERSION}" 6

      - name: Upload publish metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-publish-metadata
          path: /tmp/npm-view.json
          if-no-files-found: ignore
          retention-days: 30
