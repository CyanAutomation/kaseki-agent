name: Publish NPM

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Comma-separated tags to publish. Leave empty to auto-detect from latest git tag."
        required: false
        default: ""
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Remove deprecated npm auth config
        run: npm config delete always-auth || true

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tags }}" ]]; then
            VERSION=$(echo "${{ github.event.inputs.tags }}" | cut -d',' -f1 | sed 's/^v//')
            echo "ℹ️ Using provided version: ${VERSION}"
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            echo "ℹ️ Auto-detected version from latest git tag: ${VERSION}"
          fi

          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [[ "${CURRENT_VERSION}" == "${VERSION}" ]]; then
            echo "ℹ️ package.json already at ${VERSION}; continuing."
          else
            echo "ℹ️ Updating package.json version from ${CURRENT_VERSION} to ${VERSION}"
            npm version "${VERSION}" --no-git-tag-version
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Show resolved package info
        run: |
          echo "Package name:"
          node -p "require('./package.json').name"

          echo "Package version:"
          node -p "require('./package.json').version"

          echo "Repository:"
          node -p "require('./package.json').repository.url"

      - name: Check current npm package state
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"

          echo "Checking npm package: ${PACKAGE_NAME}"
          npm view "${PACKAGE_NAME}" name version versions --json

          echo "Checking whether target version already exists: ${PACKAGE_NAME}@${VERSION}"

          if npm view "${PACKAGE_NAME}@${VERSION}" version --json >/tmp/existing-version.json 2>/dev/null; then
            echo "⚠️ ${PACKAGE_NAME}@${VERSION} already exists on npm."
            cat /tmp/existing-version.json
            exit 1
          else
            echo "✅ ${PACKAGE_NAME}@${VERSION} does not exist yet; safe to publish."
          fi

      - name: Build
        run: npm run build

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Publish to npm registry
        run: npm publish --access public --provenance --loglevel verbose

      - name: Verify on npm registry
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"

          echo "Waiting for npm registry to index package..."
          sleep 10

          npm view "${PACKAGE_NAME}@${VERSION}" --json > /tmp/npm-view.json

          PUBLISHED_VERSION=$(jq -r '.version' /tmp/npm-view.json)

          if [[ "${PUBLISHED_VERSION}" == "${VERSION}" ]]; then
            echo "✅ Package successfully published: ${PACKAGE_NAME}@${VERSION}"
            jq '.version, .dist.tarball' /tmp/npm-view.json
          else
            echo "❌ Failed to verify package on npm registry"
            cat /tmp/npm-view.json
            exit 1
          fi

      - name: Upload publish metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-publish-metadata
          path: /tmp/npm-view.json
          if-no-files-found: ignore
          retention-days: 30
