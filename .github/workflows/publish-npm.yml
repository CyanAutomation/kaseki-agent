name: Publish NPM

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Comma-separated tags to publish. Leave empty to auto-detect from latest git tag. Use this to retry publishing if Release succeeded but npm publish failed, or to test-publish a specific version."
        required: false
        default: ""
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Get all tags

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.2'
          cache: npm
          # Note: registry-url is intentionally omitted — setting it causes setup-node@v6
          # to inject the GitHub OIDC JWT as NODE_AUTH_TOKEN, which breaks npm trusted
          # publishing (npm CLI must perform the OIDC exchange itself)

      - name: Configure npm registry (without token injection)
        run: echo "registry=https://registry.npmjs.org" >> "$HOME/.npmrc"

      - name: Verify npm authentication setup
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "npm config registry: $(npm config get registry)"

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.tags }}" ]]; then
            # Manual trigger with explicit tags input
            VERSION=$(echo "${{ github.event.inputs.tags }}" | cut -d',' -f1)
            echo "ℹ️  Using provided version: ${VERSION}"
          else
            # Automatic trigger from Release workflow or manual trigger without tags
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            echo "ℹ️  Auto-detected version from git tags: ${VERSION}"
          fi
          
          # Update package.json to match the version being published
          npm version ${VERSION} --no-git-tag-version || true
          
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Build
        run: npm run build

      - name: Publish to npm registry
        run: npm publish --access public
        # No NODE_AUTH_TOKEN — npm CLI exchanges the GitHub OIDC token with the registry
        # using ACTIONS_ID_TOKEN_REQUEST_URL, which is provided automatically by GHA

      - name: Verify on npm registry
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Waiting for npm registry to index package..."
          sleep 5
          npm view @cyanautomation/kaseki-agent@${VERSION} > /tmp/npm-view.json
          if grep -q "\"version\": \"${VERSION}\"" /tmp/npm-view.json; then
            echo "✅ Package successfully published: @cyanautomation/kaseki-agent@${VERSION}"
            cat /tmp/npm-view.json | jq '.version, .dist.tarball'
          else
            echo "❌ Failed to verify package on npm registry"
            exit 1
          fi

      - name: Upload publish metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-publish-metadata
          path: /tmp/npm-view.json
          retention-days: 30
