name: Publish NPM

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Comma-separated tags to publish. Leave empty to auto-detect from latest git tag."
        required: false
        default: ""
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tags }}" ]]; then
            VERSION=$(echo "${{ github.event.inputs.tags }}" | cut -d',' -f1 | sed 's/^v//')
            echo "ℹ️ Using provided version: ${VERSION}"
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            echo "ℹ️ Auto-detected version from latest git tag: ${VERSION}"
          fi

          npm version "${VERSION}" --no-git-tag-version

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Build
        run: npm run build

      - name: Publish to npm registry
        run: npm publish --access public --provenance

      - name: Verify on npm registry
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"

          echo "Waiting for npm registry to index package..."
          sleep 10

          npm view "@cyanautomation/kaseki-agent@${VERSION}" --json > /tmp/npm-view.json

          PUBLISHED_VERSION=$(jq -r '.version' /tmp/npm-view.json)

          if [[ "${PUBLISHED_VERSION}" == "${VERSION}" ]]; then
            echo "✅ Package successfully published: @cyanautomation/kaseki-agent@${VERSION}"
            jq '.version, .dist.tarball' /tmp/npm-view.json
          else
            echo "❌ Failed to verify package on npm registry"
            cat /tmp/npm-view.json
            exit 1
          fi

      - name: Upload publish metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-publish-metadata
          path: /tmp/npm-view.json
          if-no-files-found: ignore
          retention-days: 30
