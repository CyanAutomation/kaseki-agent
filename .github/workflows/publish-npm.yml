name: Publish NPM

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Comma-separated tags to publish. Leave empty to auto-detect from latest git tag. Use this to retry publishing if Release succeeded but npm publish failed, or to test-publish a specific version."
        required: false
        default: ""
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Get all tags

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.tags }}" ]]; then
            # Manual trigger with explicit tags input
            VERSION=$(echo "${{ github.event.inputs.tags }}" | cut -d',' -f1)
            echo "ℹ️  Using provided version: ${VERSION}"
          else
            # Automatic trigger from Release workflow or manual trigger without tags
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            echo "ℹ️  Auto-detected version from git tags: ${VERSION}"
          fi
          
          # Update package.json to match the version being published
          npm version ${VERSION} --no-git-tag-version || true
          
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Build
        run: npm run build

      - name: Diagnostics
        run: |
          echo "Checking for NODE_AUTH_TOKEN presence..."
          if [ -z "$NODE_AUTH_TOKEN" ]; then echo "NODE_AUTH_TOKEN is empty/unset"; else echo "NODE_AUTH_TOKEN is set"; fi
          echo "Checking npm config:"
          npm config list
          echo "Checking .npmrc locations:"
          [ -f ~/.npmrc ] && echo "Found ~/.npmrc" || echo "~/.npmrc not found"
          [ -f .npmrc ] && echo "Found local .npmrc" || echo "local .npmrc not found"
          echo "Checking npm identity (may fail if not authenticated):"
          npm whoami || echo "Not logged in"

      - name: Publish to npm registry
        run: npm publish --access public --verbose
        env:
          NODE_AUTH_TOKEN: ""

      - name: Verify on npm registry
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Waiting for npm registry to index package..."
          sleep 5
          npm view @cyanautomation/kaseki-agent@${VERSION} > /tmp/npm-view.json
          if grep -q "\"version\": \"${VERSION}\"" /tmp/npm-view.json; then
            echo "✅ Package successfully published: @cyanautomation/kaseki-agent@${VERSION}"
            cat /tmp/npm-view.json | jq '.version, .dist.tarball'
          else
            echo "❌ Failed to verify package on npm registry"
            exit 1
          fi

      - name: Upload publish metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-publish-metadata
          path: /tmp/npm-view.json
          retention-days: 30
