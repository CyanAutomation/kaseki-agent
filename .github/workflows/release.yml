name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Perform a dry-run (preview only, no tags/releases created)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for semantic-release

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.2'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            npm run release:dry 2>&1 | tee release-output.log
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            npm run release 2>&1 | tee release-output.log
            # Check if release was created (look for "published" in output)
            if grep -q "Published release" release-output.log; then
              echo "released=true" >> "$GITHUB_OUTPUT"
              # Extract version from git describe
              VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            else
              echo "released=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload release log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-output
          path: release-output.log
          retention-days: 30

  trigger-docker-build:
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Docker build workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          # Trigger the build-docker-image workflow for the newly created tag
          gh workflow run build-docker-image.yml \
            --ref "v${VERSION}" \
            --repo "${GITHUB_REPOSITORY}"
          echo "Triggered Docker build for v${VERSION}"
