---
# Kaseki Agent Docker Compose Configuration
#
# Setup (First Time):
# ═══════════════════════════════════════════════════════════════════════════════════
#
# Run this ONE command to configure everything:
#
#    kaseki-agent init
#
# That's it! The wizard will:
# - Auto-configure secrets directories with correct permissions
# - Ask for your OpenRouter API key
# - Create necessary files and directories
# - Show you how to deploy
#
# Then start the service:
#
#    docker-compose up -d
#
# See docs/QUICK_START.md for full instructions.
# ═══════════════════════════════════════════════════════════════════════════════════

services:

  kaseki-api:
    image: "${KASEKI_API_IMAGE:-docker.io/cyanautomation/kaseki-agent:latest}"
    container_name: kaseki-api
    user: "${KASEKI_API_USER:-10000:10000}"
    group_add:
      - "${DOCKER_GID:-985}"
    command: ["api"]
    ports:
      - "${KASEKI_API_PORT:-8080}:8080"
    environment:
      KASEKI_API_PORT: "8080"
      KASEKI_API_LOG_LEVEL: "${KASEKI_API_LOG_LEVEL:-warn}"
      KASEKI_STREAM_PROGRESS: "${KASEKI_STREAM_PROGRESS:-1}"
      KASEKI_API_MAX_CONCURRENT_RUNS: "${KASEKI_API_MAX_CONCURRENT_RUNS:-3}"
      KASEKI_RESULTS_DIR: /agents/kaseki-results
      KASEKI_SECRETS_DIR: "${KASEKI_SECRETS_DIR:-/run/secrets/kaseki}"
      KASEKI_CONTAINER_USER: "${KASEKI_CONTAINER_USER:-10000:10000}"
      KASEKI_CONTAINER_UID: "10000"
      KASEKI_CONTAINER_GID: "10000"
      KASEKI_AGENT_TIMEOUT_SECONDS: "${KASEKI_AGENT_TIMEOUT_SECONDS:-10800}"
      KASEKI_TEMPLATE_DOCTOR_TIMEOUT_MS: "${KASEKI_TEMPLATE_DOCTOR_TIMEOUT_MS:-15000}"
      KASEKI_MAX_DIFF_BYTES: "${KASEKI_MAX_DIFF_BYTES:-400000}"
      OPENROUTER_API_KEY_FILE: "${OPENROUTER_API_KEY_FILE:-/run/secrets/kaseki/openrouter_api_key}"
      GITHUB_APP_ID_FILE: "${GITHUB_APP_ID_FILE:-/run/secrets/kaseki/github_app_id}"
      GITHUB_APP_CLIENT_ID_FILE: "${GITHUB_APP_CLIENT_ID_FILE:-/run/secrets/kaseki/github_app_client_id}"
      GITHUB_APP_PRIVATE_KEY_FILE: "${GITHUB_APP_PRIVATE_KEY_FILE:-/run/secrets/kaseki/github_app_private_key}"
    volumes:
      # /agents: Shared workspace for template, runs, results, and cache
      #   - Must be writable by UID 10000 (see one-time setup above)
      #   - run-kaseki.sh and ephemeral worker containers use /agents/kaseki-runs/{instance}
      #   - API service stores persistent results in /agents/kaseki-results/{instance}
      #   - Auto-initializes /agents/kaseki-template on first startup
      - /agents:/agents:rw
      # /agents/kaseki-results: Explicit mount for worker container access
      #   - Worker containers spawned by API service need direct access to this directory
      #   - Must be writable for scouting and validation artifacts
      - /agents/kaseki-results:/agents/kaseki-results:rw
      # Secrets: one read-only host directory mount. Put all required files in
      # /home/pi/secrets, or set KASEKI_HOST_SECRETS_DIR to another directory.
      - ${KASEKI_HOST_SECRETS_DIR:-/home/pi/secrets}:/run/secrets/kaseki:ro
      # Logs: Persistent API service logs with rotation
      - kaseki-logs:/var/log/kaseki-api
      # Docker socket: Allows API service to spawn worker containers
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
      - /run
      - /results
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/ready').then(r=>r.json()).then(d=>process.exit(d.status==='ready'?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kaseki-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kaseki-logs:
    driver: local

networks:
  kaseki-network:
    driver: bridge
