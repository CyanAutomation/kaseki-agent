version: '3.8'

services:
  kaseki-api:
    image: docker.io/cyanautomation/kaseki-agent:latest
    container_name: kaseki-api
    user: "0:0"
    entrypoint: ["node"]
    command: ["/app/dist/kaseki-api-service.js"]
    ports:
      - "8080:8080"
    environment:
      KASEKI_API_PORT: "8080"
      KASEKI_API_KEYS: "${KASEKI_API_KEYS:-sk-dev-key}"
      KASEKI_API_LOG_LEVEL: "${KASEKI_API_LOG_LEVEL:-info}"
      KASEKI_API_MAX_CONCURRENT_RUNS: "${KASEKI_API_MAX_CONCURRENT_RUNS:-3}"
      KASEKI_RESULTS_DIR: /agents/kaseki-results
      KASEKI_CONTAINER_USER: "${KASEKI_CONTAINER_USER:-1000:1000}"
      KASEKI_AGENT_TIMEOUT_SECONDS: "${KASEKI_AGENT_TIMEOUT_SECONDS:-1200}"
      KASEKI_MAX_DIFF_BYTES: "${KASEKI_MAX_DIFF_BYTES:-200000}"
    volumes:
      - /agents:/agents:rw
      - kaseki-results:/agents/kaseki-results
      - kaseki-logs:/var/log/kaseki-api
      - /var/run/docker.sock:/var/run/docker.sock
    restart: on-failure
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
      - /run
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kaseki-network

volumes:
  kaseki-results:
    driver: local
  kaseki-logs:
    driver: local

networks:
  kaseki-network:
    driver: bridge
