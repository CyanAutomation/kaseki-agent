services:
  kaseki-api:
    image: "${KASEKI_API_IMAGE:-docker.io/cyanautomation/kaseki-agent:latest}"
    container_name: kaseki-api
    user: "${KASEKI_API_USER:-10000:10000}"
    group_add:
      - "${DOCKER_GID:-985}"
    command: ["api"]
    ports:
      - "${KASEKI_API_PORT:-8080}:8080"
    environment:
      KASEKI_API_PORT: "8080"
      KASEKI_API_KEYS_FILE: "${KASEKI_API_KEYS_FILE:-/agents/secrets/kaseki_api_keys}"
      KASEKI_API_LOG_LEVEL: "${KASEKI_API_LOG_LEVEL:-info}"
      KASEKI_API_MAX_CONCURRENT_RUNS: "${KASEKI_API_MAX_CONCURRENT_RUNS:-3}"
      KASEKI_RESULTS_DIR: /agents/kaseki-results
      KASEKI_CONTAINER_USER: "${KASEKI_CONTAINER_USER:-10000:10000}"
      KASEKI_CONTAINER_UID: "10000"
      KASEKI_CONTAINER_GID: "10000"
      KASEKI_AGENT_TIMEOUT_SECONDS: "${KASEKI_AGENT_TIMEOUT_SECONDS:-1200}"
      KASEKI_MAX_DIFF_BYTES: "${KASEKI_MAX_DIFF_BYTES:-200000}"
      OPENROUTER_API_KEY_FILE: "${OPENROUTER_API_KEY_FILE:-/agents/secrets/openrouter_api_key}"
      GITHUB_APP_ID_FILE: "${GITHUB_APP_ID_FILE:-/agents/secrets/github_app_id}"
      GITHUB_APP_CLIENT_ID_FILE: "${GITHUB_APP_CLIENT_ID_FILE:-/agents/secrets/github_app_client_id}"
      GITHUB_APP_PRIVATE_KEY_FILE: "${GITHUB_APP_PRIVATE_KEY_FILE:-/agents/secrets/github_app_private_key}"
    volumes:
      - /agents:/agents:rw
      - kaseki-logs:/var/log/kaseki-api
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
      - /run
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kaseki-network

volumes:
  kaseki-logs:
    driver: local

networks:
  kaseki-network:
    driver: bridge
