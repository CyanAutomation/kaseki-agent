---
# Kaseki Agent Docker Compose Configuration
#
# IMPORTANT: Host Setup Prerequisites (mostly automated via init container now)
# ═══════════════════════════════════════════════════════════════════════════════════
#
# The init container runs first and attempts to fix /agents permissions automatically.
# If your environment is restricted (read-only volumes, no permission escalation),
# you may need to pre-create the directory on the host:
#
#    sudo mkdir -p /agents
#    sudo chown 10000:10000 /agents
#    sudo chmod 755 /agents
#
# For Dockhand/Portainer users: See docs/DEPLOYMENT.md#dockhand-portainer for
# step-by-step screenshot-based setup instructions.
#
# Validate setup before deploying (optional):
#
#    ./scripts/kaseki-preflight-docker-compose.sh
#
# Provide OpenRouter API credentials:
#
#    Option A: File-based (recommended)
#      mkdir -p /home/pi/secrets
#      echo "sk-or-..." > /home/pi/secrets/openrouter_api_key
#      chmod 600 /home/pi/secrets/openrouter_api_key
#
#    Option B: Environment variable
#      export OPENROUTER_API_KEY_FILE=/path/to/api/key
#
# ═══════════════════════════════════════════════════════════════════════════════════

services:
  
  kaseki-init:
    image: "${KASEKI_API_IMAGE:-docker.io/cyanautomation/kaseki-agent:latest}"
    container_name: kaseki-init
    user: "${KASEKI_API_USER:-10000:10000}"
    command: ["/scripts/kaseki-init-container.sh"]
    volumes:
      # /agents: Shared workspace - init container attempts to fix permissions
      - /agents:/agents:rw
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    # Run once at startup and exit (don't restart)
    restart: "no"
    # Give init container 10 seconds to complete before api service starts
    # (depends_on is handled via wait logic in api service health check)
  kaseki-api:
    image: "${KASEKI_API_IMAGE:-docker.io/cyanautomation/kaseki-agent:latest}"
    container_name: kaseki-api
    user: "${KASEKI_API_USER:-10000:10000}"
    depends_on:
      # Init container runs first, attempts to fix /agents permissions
      # If it fails (exit code 1), api service still starts but logs
      # will show actionable error messages for manual remediation
      kaseki-init:
        condition: service_completed_successfully
    group_add:
      - "${DOCKER_GID:-985}"
    command: ["api"]
    ports:
      - "${KASEKI_API_PORT:-8080}:8080"
    environment:
      KASEKI_API_PORT: "8080"
      KASEKI_API_LOG_LEVEL: "${KASEKI_API_LOG_LEVEL:-info}"
      KASEKI_API_MAX_CONCURRENT_RUNS: "${KASEKI_API_MAX_CONCURRENT_RUNS:-3}"
      KASEKI_RESULTS_DIR: /agents/kaseki-results
      KASEKI_CONTAINER_USER: "${KASEKI_CONTAINER_USER:-10000:10000}"
      KASEKI_CONTAINER_UID: "10000"
      KASEKI_CONTAINER_GID: "10000"
      KASEKI_AGENT_TIMEOUT_SECONDS: "${KASEKI_AGENT_TIMEOUT_SECONDS:-3600}"
      KASEKI_TEMPLATE_DOCTOR_TIMEOUT_MS: "${KASEKI_TEMPLATE_DOCTOR_TIMEOUT_MS:-15000}"
      KASEKI_MAX_DIFF_BYTES: "${KASEKI_MAX_DIFF_BYTES:-400000}"
      KASEKI_SECRETS_DIR: "${KASEKI_SECRETS_DIR:-/run/secrets/kaseki}"
      OPENROUTER_API_KEY_FILE: "${OPENROUTER_API_KEY_FILE:-/run/secrets/kaseki/openrouter_api_key}"
      GITHUB_APP_ID_FILE: "${GITHUB_APP_ID_FILE:-/run/secrets/kaseki/github_app_id}"
      GITHUB_APP_CLIENT_ID_FILE: "${GITHUB_APP_CLIENT_ID_FILE:-/run/secrets/kaseki/github_app_client_id}"
      GITHUB_APP_PRIVATE_KEY_FILE: "${GITHUB_APP_PRIVATE_KEY_FILE:-/run/secrets/kaseki/github_app_private_key}"
    volumes:
      # /agents: Shared workspace for template, runs, results, and cache
      #   - Init container attempts to fix permissions automatically
      #   - If init fails, must be writable by UID 10000 (see Prerequisites above)
      #   - run-kaseki.sh and ephemeral worker containers use /agents/kaseki-runs/{instance}
      #   - API service stores persistent results in /agents/kaseki-results/{instance}
      #   - Auto-initializes /agents/kaseki-template on first startup
      - /agents:/agents:rw
      # Secrets: Mount readonly for API key and GitHub App credentials
      - /home/pi/secrets:/run/secrets/kaseki:ro
      # Logs: Persistent API service logs with rotation
      - kaseki-logs:/var/log/kaseki-api
      # Docker socket: Allows API service to spawn worker containers
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
      - /run
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kaseki-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kaseki-logs:
    driver: local

networks:
  kaseki-network:
    driver: bridge
